name: Crawl Hugging Face Daily Papers

on:
  schedule:
    # 오전 11시 (KST) = UTC 02:00
    - cron: '0 2 * * *'
    # 오후 11시 (KST) = UTC 14:00
    - cron: '0 14 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write  # 커밋 및 푸시를 위한 권한
  actions: write   # 배포 워크플로우 수동 실행을 위한 권한

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0  # 전체 히스토리 가져오기
        ref: refs/heads/master  # master 브랜치 명시적 지정
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run crawler
      run: |
        python scripts/crawl_hf_papers.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 변경된 파일 확인
        echo "=== 변경된 파일 확인 ==="
        git status
        
        # _posts/와 _data/papers/ 디렉토리의 변경사항 추가
        git add _posts/ _data/papers/
        
        # 추가된 파일 확인
        echo "=== 스테이징된 파일 확인 ==="
        git diff --staged --name-only
        
        # 변경사항이 있을 때만 커밋 및 푸시
        if ! git diff --staged --quiet; then
          echo "✅ 변경사항이 있습니다. 커밋 및 푸시를 시도합니다..."
          COMMIT_MSG="Auto-update: Daily papers summary $(date +'%Y-%m-%d %H:%M')"
          echo "커밋 메시지: $COMMIT_MSG"
          git commit -m "$COMMIT_MSG" || exit 1
          
          # 푸시 재시도 로직 (최대 3회)
          max_retries=3
          retry_count=0
          while [ $retry_count -lt $max_retries ]; do
            if git push; then
              echo "✅ 변경사항이 커밋되고 푸시되었습니다."
              echo "📦 배포 워크플로우를 실행합니다."
              GH_TOKEN="${{ github.token }}" gh workflow run pages-deploy.yml --ref master
              echo "   GitHub Actions에서 'Build and Deploy Pages' 워크플로우 실행을 확인하세요."
              exit 0
            else
              retry_count=$((retry_count + 1))
              echo "⚠️ 푸시 실패 (시도 $retry_count/$max_retries). 5초 후 재시도..."
              sleep 5
            fi
          done
          echo "❌ 푸시 실패: 최대 재시도 횟수 초과"
          exit 1
        else
          echo "ℹ️ 변경사항이 없어 커밋하지 않습니다."
          echo "   (이미 최신 상태이거나 크롤링 결과가 동일할 수 있습니다)"
        fi
